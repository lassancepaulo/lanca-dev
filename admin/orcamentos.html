<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orçamentos — lança.dev Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<div class="admin-layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg width="14" height="32" viewBox="0 0 44 100" fill="none"><path d="M22 2 L34 72 L22 82 L10 72 Z" fill="#FF4D00"/></svg>
      <div class="sidebar-logo-text">lança<span>.dev</span></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Principal</div>
      <a href="index.html"><i class="fas fa-chart-bar"></i> Dashboard</a>
      <a href="leads.html"><i class="fas fa-users"></i> Leads / CRM</a>
      <a href="orcamentos.html" class="active"><i class="fas fa-file-invoice-dollar"></i> Orçamentos</a>
      <div class="nav-section">Sistema</div>
      <a href="configuracoes.html"><i class="fas fa-cog"></i> Configurações</a>
      <a href="../index.html" target="_blank"><i class="fas fa-external-link-alt"></i> Ver site</a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</a>
    </div>
  </aside>

  <main class="main-content">

    <div class="page-header">
      <div class="page-header-info">
        <h1>Orçamentos</h1>
        <p>Gestão de propostas e contratos</p>
      </div>
      <div class="page-header-actions">
        <a href="orcamento-novo.html" class="btn btn-primary">
          <i class="fas fa-plus"></i> Novo Orçamento
        </a>
      </div>
    </div>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card stat-card-orange">
        <div class="stat-icon"><i class="fas fa-file-invoice-dollar"></i></div>
        <div class="stat-info">
          <div class="stat-value" id="statTotal">0</div>
          <div class="stat-label">Total Orçamentos</div>
        </div>
      </div>
      <div class="stat-card stat-card-green">
        <div class="stat-icon"><i class="fas fa-dollar-sign"></i></div>
        <div class="stat-info">
          <div class="stat-value" id="statFaturamento">R$ 0</div>
          <div class="stat-label">Faturamento Estimado</div>
        </div>
      </div>
      <div class="stat-card stat-card-yellow">
        <div class="stat-icon"><i class="fas fa-clock"></i></div>
        <div class="stat-info">
          <div class="stat-value" id="statPendentes">0</div>
          <div class="stat-label">Pendentes</div>
        </div>
      </div>
    </div>

    <div class="filter-bar">
      <input
        type="text"
        id="searchInput"
        class="form-control"
        placeholder="Buscar por nome do cliente..."
      >
      <select id="filterStatus" class="form-control">
        <option value="">Todos os status</option>
        <option value="pendente">Pendente</option>
        <option value="aprovado">Aprovado</option>
        <option value="pago">Pago</option>
        <option value="cancelado">Cancelado</option>
      </select>
      <select id="filterMes" class="form-control">
        <option value="">Todos os meses</option>
      </select>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table class="table" id="quotesTable">
          <thead>
            <tr>
              <th>Nº Orçamento</th>
              <th>Cliente</th>
              <th>Projeto</th>
              <th>Valor Total</th>
              <th>Status</th>
              <th>Data</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="quotesBody">
            <tr>
              <td colspan="7" class="text-center text-muted">Carregando orçamentos...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script src="../js/dataService.js"></script>
<script src="../js/admin.js"></script>
<script>
  requireAuth();

  let allQuotes = [];

  function populateMonthFilter() {
    const select = document.getElementById('filterMes');
    const months = [
      'Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
      'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'
    ];
    const now = new Date();
    for (let i = 0; i < 12; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const value = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      const label = `${months[d.getMonth()]} ${d.getFullYear()}`;
      const opt = document.createElement('option');
      opt.value = value;
      opt.textContent = label;
      select.appendChild(opt);
    }
  }

  function calcTotal(quote) {
    const items = quote.items || [];
    const subtotal = items.reduce((acc, item) => acc + ((item.qty || 1) * (item.unitPrice || 0)), 0);
    const discount = parseFloat(quote.discount) || 0;
    return Math.max(0, subtotal - discount);
  }

  function updateStats(quotes) {
    const total = quotes.length;
    const faturamento = quotes.filter(q => q.status === 'pago').reduce((acc, q) => acc + calcTotal(q), 0);
    const pendentes = quotes.filter(q => q.status === 'pendente').length;

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statFaturamento').textContent = fmtMoney(faturamento);
    document.getElementById('statPendentes').textContent = pendentes;
  }

  function loadQuotes() {
    allQuotes = DS.getQuotes();
    updateStats(allQuotes);
    renderTable(allQuotes);
  }

  function renderTable(quotes) {
    const tbody = document.getElementById('quotesBody');
    if (!quotes || quotes.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">Nenhum orçamento encontrado.</td></tr>';
      return;
    }
    tbody.innerHTML = quotes.map(q => {
      const total = calcTotal(q);
      return `
        <tr>
          <td><code>${q.id || '—'}</code></td>
          <td>
            <div class="lead-name">${q.clientName || '—'}</div>
            <div class="text-muted text-small">${q.clientEmail || ''}</div>
          </td>
          <td>${q.projectType || '—'}</td>
          <td><strong>${fmtMoney(total)}</strong></td>
          <td>${statusBadge(q.status, QUOTE_STATUS)}</td>
          <td>${fmtDate(q.createdAt || q.date)}</td>
          <td class="actions-cell">
            <button class="btn btn-icon btn-ghost btn-orange" title="Gerar PDF" onclick="downloadPDF('${q.id}')">
              <i class="fas fa-file-pdf"></i>
            </button>
            <a href="orcamento-novo.html?id=${encodeURIComponent(q.id)}" class="btn btn-icon btn-ghost" title="Editar orçamento">
              <i class="fas fa-edit"></i>
            </a>
            <button class="btn btn-icon btn-ghost btn-danger" title="Excluir orçamento" onclick="deleteQuote('${q.id}')">
              <i class="fas fa-trash"></i>
            </button>
          </td>
        </tr>
      `;
    }).join('');
  }

  function filterQuotes() {
    const search = document.getElementById('searchInput').value.toLowerCase().trim();
    const status = document.getElementById('filterStatus').value;
    const mes = document.getElementById('filterMes').value;

    const filtered = allQuotes.filter(q => {
      const matchSearch = !search || (q.clientName || '').toLowerCase().includes(search);
      const matchStatus = !status || q.status === status;
      let matchMes = true;
      if (mes) {
        const dateStr = q.createdAt || q.date || '';
        matchMes = dateStr.startsWith(mes);
      }
      return matchSearch && matchStatus && matchMes;
    });

    renderTable(filtered);
  }

  function loadJsPDF(callback) {
    if (window.jspdf) { callback(); return; }
    const s1 = document.createElement('script');
    s1.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s1.onload = () => {
      const s2 = document.createElement('script');
      s2.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js';
      s2.onload = callback;
      document.head.appendChild(s2);
    };
    document.head.appendChild(s1);
  }

  function downloadPDF(id) {
    const quote = allQuotes.find(q => q.id === id);
    if (!quote) { showToast('Orçamento não encontrado.', 'error'); return; }
    loadJsPDF(() => {
      generatePDF(quote);
    });
  }

  function deleteQuote(id) {
    confirmDialog('Tem certeza que deseja excluir este orçamento? Esta ação não pode ser desfeita.', () => {
      DS.deleteQuote(id);
      showToast('Orçamento excluído.', 'info');
      loadQuotes();
    });
  }

  document.getElementById('searchInput').addEventListener('input', filterQuotes);
  document.getElementById('filterStatus').addEventListener('change', filterQuotes);
  document.getElementById('filterMes').addEventListener('change', filterQuotes);

  populateMonthFilter();
  loadQuotes();
</script>
</body>
</html>
